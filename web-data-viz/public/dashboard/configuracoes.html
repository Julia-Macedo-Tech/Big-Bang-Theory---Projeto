<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="shortcut icon" href="../assets/icon/favicon2.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaTech | Tempo Real</title>


    <link rel="stylesheet" href="./../css/dashboards.css">
    <link rel="stylesheet" href="./../css/estilo.css" />

    <script src="../js/sessao.js"></script>
    <script src="../js/alerta.js"></script>
    <link rel="preconnect" href="https://fonts.gstatic.com">

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />


</head>

<!-- onload="validarSessao(), exibirAquarios(),  atualizacaoPeriodica()" -->

<body onload="validarSessao()">

    <div class="janela">

        <div class="header-left dash-header">

            <img class="logo" src="../assets/imgs/icon.png" alt="">
            <h1>Big Bang Theory</h1>

            <div class="btn-nav-white">
                <a href="cards.html">
                    <p>Quiz</p>
                </a>
            </div>

            <div class="btn-nav-white">
                <a href="./dashboard.html">
                    <p>Gráficos</p>
                </a>
            </div>

            <div class="btn-nav-white">
                <a href="./jogos.html">
                    <p>Jogos</p>
                </a>
            </div>

            <div id="hello">
                <img src="../assets/imgs/sem_foto.png" alt="">
                <p><span id="b_usuario">usuário</span>!</p>
            </div>

            <div class="funcionalidades">
                <div class="btn-logout" onclick="limparSessao()">
                    <span class="material-symbols-outlined">logout</span>
                </div>
                <div class="btn-logout usando">
                    <a class="material-symbols-outlined" href="">Settings</a>
                </div>
            </div>

        </div>

        <div class="dash">
            <div class="dash-container">

                <p>Escolher avatar</p>

                <div class="fotos_personagens">
                    <button onclick="escolherAvatar('1')"><img id="1" src="../assets/imgs/1.png" alt=""></button>
                    <button onclick="escolherAvatar('2')"><img id="2" src="../assets/imgs/2.png" alt=""></button>
                    <button onclick="escolherAvatar('3')"><img id="3" src="../assets/imgs/3.png" alt=""></button>
                    <button onclick="escolherAvatar('4')"><img id="4" src="../assets/imgs/4.png" alt=""></button>
                    <button onclick="escolherAvatar('5')"><img id="5" src="../assets/imgs/5.png" alt=""></button>
                    <button onclick="escolherAvatar('6')"><img id="6" src="../assets/imgs/6.png" alt=""></button>
                    <button onclick="escolherAvatar('7')"><img id="7" src="../assets/imgs/7.png" alt=""></button>
                </div>

                <button class="concluido" id="concluido" onclick="guardarFoto()">Concluído</button>

            </div>
        </div>

    </div>

</body>

<script>

    let quantidade = 0;
    let escolhida = 0;

    function escolherAvatar(escolha) {
        if (quantidade == 0) {
            quantidade++;
            document.getElementById(escolha).classList.add("escolha");
            escolhida = Number(escolha);
            console.log(escolhida, escolha)
            console.log(quantidade)

        } else if (escolhida == escolha && quantidade > 0) {
            quantidade = 0;
            document.getElementById(escolha).classList.remove("escolha");
            escolhida = 0;
            console.log(escolhida)
            console.log(quantidade)

        } else {
            alert("Você já escolheu um avatar! Desmarque ele se quiser mudar.")
        }
    }

    let id = sessionStorage.ID_USUARIO;

    function guardarFoto() {
        if (escolhida != 0) {
            fetch(`/usuarios/fotoPerfil/${escolhida}/${id}`, { cache: 'no-store' }).then(function (response) {
                if (response.ok) {

                    sessionStorage.FOTO_USUARIO = escolhida;
                    document.getElementById(String(escolhida)).classList.remove("escolha");
                    quantidade = 0;
                    validarSessao();
                    alert("Avatar escolhido!")

                } else {
                    console.error('Nenhum dado encontrado ou erro na API');
                }
            })
                .catch(function (error) {
                    console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
                });

        } else {
            alert("Escolha um avatar!")
        }
    }

    function exibirAquarios() {
        JSON.parse(sessionStorage.AQUARIOS).forEach(item => {
            document.getElementById("cardAquarios").innerHTML += `
                    <div class="card-aquario">
                        <div class="title-aquario">
                            <h1>${item.descricao}</h1>
                        </div>
                        <div class="desc-aquario">
                        <div class="temperatura">
                            <p id="temp_aquario_${item.id}">-°C</p>
                        </div>
                        <div class="cor-alerta" id="card_${item.id}"></div>
                    </div>
                    </div>
                    `
        });
    }

</script>

</html>
