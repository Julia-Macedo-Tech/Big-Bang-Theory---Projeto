        document.getElementById('jogoQuiz').style.display = "flex"

        tipoNivel = tipo;

        if (tipoNivel == "Fácil") {

        }

        embaralhar();

        btnSubmeter.disabled = false
        btnProx.disabled = true
        // btnConcluir.disabled = true
        btnTentarNovamente.disabled = true
    }

        if (tipoNivel == "Fácil") {

            for (let linha = listaDeQuestoesFacil.length - 1; linha >= 0; linha--) {
                console.log(listaDeQuestoesFacil[linha]);
                numero = Math.floor(Math.random() * linha);

                troca.push(listaDeQuestoesFacil[linha]);
                listaDeQuestoesFacil[linha] = listaDeQuestoesFacil[numero];
                listaDeQuestoesFacil[numero] = troca.pop();

    function submeter() {
        const options = document.getElementsByName("option"); // recupera alternativas no html

        let hasChecked = false
        for (let i = 0; i < options.length; i++) {
            if (options[i].checked) {
                hasChecked = true
                break
            }
        }

        if (!hasChecked) {
            alert("Não há alternativas escolhidas. Escolha uma opção.")
        } else {
            btnSubmeter.disabled = true
            btnProx.disabled = false

            habilitarAlternativas(false)

            checarResposta()
        }
    }

                preencherHTMLcomQuestaoAtual(numeroDaQuestaoAtual)

                preencherHTMLcomQuestaoAtual(numeroDaQuestaoAtual)
