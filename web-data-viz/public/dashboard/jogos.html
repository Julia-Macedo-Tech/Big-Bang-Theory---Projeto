    function embaralhar() {
        let numero = 0;
        movimentos_numero = 0;

        movimentos_div.innerHTML = `<span class="material-symbols-outlined">Footprint</span>${movimentos_numero}`;

        for (let linha = posicao.length - 1; linha >= 0; linha--) {

            for (let coluna = posicao[linha].length - 1; coluna >= 0; coluna--) {
                console.log(posicao[linha][coluna]);
                let numero = Math.floor(Math.random() * (linha));
                let numero2 = Math.floor(Math.random() * (coluna));
                let troca = [];
                troca.push(posicao[linha][coluna]);
                posicao[linha][coluna] = posicao[numero][numero2];
                posicao[numero][numero2] = troca.pop();
            }
        }

        preencherPuzzle();

    }

    function preencherPuzzle() {
        container_puzzle.innerHTML = ``;
        movimentos_div.innerHTML = `<span class="material-symbols-outlined">Footprint</span>${movimentos_numero}`;


        for (let linha = 0; linha < posicao.length; linha++) {
            console.log(posicao[linha]);

            for (let coluna = 0; coluna < posicao[linha].length; coluna++) {
                console.log(posicao[linha][coluna]);
                if (posicao[linha][coluna] == "b9") {
                    container_puzzle.innerHTML += `<button class="diferente" id="b9" onclick="movimentos('b9')"></button>`;

                } else {
                    container_puzzle.innerHTML += `<button class="igual" id="${posicao[linha][coluna]}" onclick="movimentos('${posicao[linha][coluna]}')"></button>`;
                }
            }
        }

        verificar();
    }

    let idusuario = sessionStorage.ID_USUARIO;

    function verificar() {
        let soma = 0;

        for (let linha = 0; linha < posicao.length; linha++) {
            console.log(posicao[linha]);

            for (let coluna = 0; coluna < posicao[linha].length; coluna++) {
                console.log(posicao[linha][coluna]);

                if (posicao[linha][coluna] == posicao_certa[linha][coluna]) {
                    soma++;
                }

            }
        }

        if (soma == 9) {
            fetch(`/jogos/cadastroPuzzle/${movimentos_numero}/${idusuario}`, { cache: 'no-store' }).then(function (response) {
                if (response.ok) {
                    console.log("Puzzle cadastrado")

                } else {
                    console.error('Nenhum dado encontrado ou erro na API');
                }
            })
                .catch(function (error) {
                    console.error(`Erro no cadastro dos dados p/ gráfico: ${error.message}`);
                });

            setTimeout(() => {
                alert("Você ganhou, parabéns!")
            }, 2000);

        } else {

        }
    }
