    function embaralhar() {
        let numero = 0;
        movimentos_numero = 0;

        movimentos_div.innerHTML = `<span class="material-symbols-outlined">Footprint</span>${movimentos_numero}`;

        if (embaralhadas == 3) {
            posicao = posicao_quase_certa;

        } else {
            for (let linha = posicao.length - 1; linha >= 0; linha--) {

                for (let coluna = posicao[linha].length - 1; coluna >= 0; coluna--) {
                    console.log(posicao[linha][coluna]);
                    let numero = Math.floor(Math.random() * (linha));
                    let numero2 = Math.floor(Math.random() * (coluna));
                    let troca = [];
                    troca.push(posicao[linha][coluna]);
                    posicao[linha][coluna] = posicao[numero][numero2];
                    posicao[numero][numero2] = troca.pop();
                }
            }
        }

        embaralhadas++;
        preencherPuzzle();

    }

    function preencherPuzzle() {
        container_puzzle.innerHTML = ``;
        movimentos_div.innerHTML = `<span class="material-symbols-outlined">Footprint</span>${movimentos_numero}`;


        for (let linha = 0; linha < posicao.length; linha++) {
            console.log(posicao[linha]);

            for (let coluna = 0; coluna < posicao[linha].length; coluna++) {
                console.log(posicao[linha][coluna]);
                if (posicao[linha][coluna] == "b9") {
                    container_puzzle.innerHTML += `<button class="diferente" id="b9" onclick="movimentos('b9')"></button>`;

                } else {
                    container_puzzle.innerHTML += `<button class="igual" id="${posicao[linha][coluna]}" onclick="movimentos('${posicao[linha][coluna]}')"></button>`;
                }
            }
        }

        verificar();
    }

    let idusuario = sessionStorage.ID_USUARIO;

    function verificar() {
        let soma = 0;

        for (let linha = 0; linha < posicao.length; linha++) {
            console.log(posicao[linha]);

            for (let coluna = 0; coluna < posicao[linha].length; coluna++) {
                console.log(posicao[linha][coluna]);

                if (posicao[linha][coluna] == posicao_certa[linha][coluna]) {
                    soma++;
                }

            }
        }

        if (soma == 9) {
            fetch(`/jogos/selectPuzzle/${idusuario}`, { cache: 'no-store' }).then(function (response) {
                if (response.ok) {
                    if (response.status == 200) {
                        response.json().then(function (resposta) {
                            console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                            resposta.reverse();

                            if (resposta.length > 0) {
                                if (movimentos_numero < resposta[0].qtd_movimentos) {
                                    update();

                                } else {
                                    setTimeout(() => {
                                        alert("Você ganhou, parabéns!")
                                        window.location = "jogos.html";
                                    }, 1000);
                                }

                            } else {
                                console.log("caiu else 1")
                                cadastrar();
                            }

                        });
                    } else {
                        cadastrar();
                    }

                } else {
                    console.log("caiu else 2")
                    console.error('Nenhum dado encontrado ou erro na API');
                }
            })
                .catch(function (error) {
                    console.log("caiu catch")
                    console.error(`Erro no cadastro dos dados p/ gráfico: ${error.message}`);
                });

        } else {
            console.log(soma)
        }
    }

    function update() {
        fetch(`/jogos/updatePuzzle/${movimentos_numero}/${idusuario}`, { cache: 'no-store' }).then(function (response) {
            if (response.ok) {
                console.log("Puzzle cadastrado")

            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro no cadastro dos dados p/ gráfico: ${error.message}`);
            });

        setTimeout(() => {
            alert("Você bateu seu recorde, parabéns!")
            window.location = "jogos.html";
        }, 1000);
    }

    function cadastrar() {

            });

        carta1_maquina_ataque = cartas[carta1_maquina]["ataque"];
        carta2_maquina_ataque = cartas[carta2_maquina]["ataque"];

        preencherHTML();
    }

    function preencherHTML() {
        carta_pessoa.innerHTML = `<p id="vida_pessoa">Vida restante: ${carta1_vida}</p>
                        <img src="../assets/imgs/${carta1}.png" alt="">`;

        carta_maquina.innerHTML = `<p id="vida_pessoa">Vida restante: ${carta1_maquina_vida}</p>
                        <img src="../assets/imgs/${carta1_maquina}.png" alt="">`;

        trocar_pessoa.innerHTML = `<img src="../assets/imgs/${carta2}.png"
                                alt="">`;

        trocar_maquina.innerHTML = `<img src="../assets/imgs/${carta2_maquina}.png"
                                alt="">`;
    }

    function trocarCartas() {
        if (carta2_vida > 0) {
            let guardar = carta1;
            carta1 = carta2;
            carta2 = guardar;

            let guardar_vida = carta1_vida;
            carta1_vida = carta2_vida;
            carta2_vida = guardar_vida;

            let guardar_ataque = carta1_ataque;
            carta1_ataque = carta2_ataque;
            carta2_ataque = guardar_ataque;

        } else {
            alert("Carta fora do combate por vida esgotada.")
        }

        if (carta1_maquina_vida > 0 && carta2_maquina_vida > 0) {
            trocarCartasMaquina();

        } else {
        }
        preencherHTML();
    }

    function trocarCartasMaquina() {
        if (carta1_vida > carta1_maquina_vida) {
            let guardar = carta1_maquina;
            carta1_maquina = carta2_maquina;
            carta2_maquina = guardar;

            let guardar_vida = carta1_maquina_vida;
            carta1_maquina_vida = carta2_maquina_vida;
            carta2_maquina_vida = guardar_vida;

            let guardar_ataque = carta1_maquina_ataque;
            carta1_maquina_ataque = carta2_maquina_ataque;
            carta2_maquina_ataque = guardar_ataque;
        }
    }

    function turnoPessoa(tipo) {
        disabled();

        let tipoPessoa = tipo;

        let tipoMaquina = turnoMaquina();

        if (tipoMaquina == "defensivo") {
            defensivoMaquina();

        }
        if (tipoPessoa == "defensivo") {
            defensivo();

        }
        if (tipoPessoa == "atacar") {
            atacar();

        }
        if (tipoMaquina == "atacar") {
            atacarMaquina();
        }

        setTimeout(() => {
            abled();
        }, 1000);

        preencherHTML();

    }

    function turnoMaquina() {
        let qual_ataque = Math.floor(Math.random() * (3));

        if (qual_ataque == 1) {
            return "defensivo";

        } else {
            return "atacar";
        }
    }

    function atacar() {
        carta1_maquina_vida = carta1_maquina_vida - carta1_ataque;

        verificarVidaMaquina();
    }

    function atacarMaquina() {
        carta1_vida = carta1_vida - carta1_maquina_ataque;

        verificarVidaPessoa();
    }

    function defensivo() {
        carta1_vida = carta1_vida + 10;

        verificarVidaMaquina();
    }

    function defensivoMaquina() {
        carta1_maquina_vida = carta1_maquina_vida + 10;


        verificarVidaPessoa();
    }

    function verificarVidaMaquina() {
        if (carta1_maquina_vida > 0) {

        } else if (carta2_maquina_vida > 0) {
            let guardar = carta1_maquina;
            carta1_maquina = carta2_maquina;
            carta2_maquina = guardar;

            let guardar_vida = carta1_maquina_vida;
            carta1_maquina_vida = carta2_maquina_vida;
            carta2_maquina_vida = guardar_vida;

            let guardar_ataque = carta1_maquina_ataque;
            carta1_maquina_ataque = carta2_maquina_ataque;
            carta2_maquina_ataque = guardar_ataque;

        } else {
            alert("Você ganhou, parabéns!")

            vencedor = "Você";
            cadastrarLuta();

            window.location = "jogos.html";
        }
    }

    function verificarVidaPessoa() {
        if (carta1_vida > 0) {

        } else if (carta2_vida > 0) {
            let guardar = carta1;
            carta1 = carta2;
            carta2 = guardar;

            let guardar_vida = carta1_vida;
            carta1_vida = carta2_vida;
            carta2_vida = guardar_vida;

            let guardar_ataque = carta1_ataque;
            carta1_ataque = carta2_ataque;
            carta2_ataque = guardar_ataque;

        } else {
            alert("Você perdeu!")

            vencedor = "Máquina";
            cadastrarLuta();

            window.location = "jogos.html";
        }
    }

    function disabled() {
        document.getElementById('trocar_pessoa').style.opacity = "50%";
        document.getElementById('trocar_maquina').style.opacity = "50%";
        document.getElementById('ataques').style.opacity = "50%";

        document.getElementById('trocar_pessoa').disabled = true;
        document.getElementById('trocar_maquina').disabled = true;
        document.getElementById('ataques').disabled = true;
    }

    function abled() {
        document.getElementById('trocar_pessoa').style.opacity = "100%";
        document.getElementById('trocar_maquina').style.opacity = "100%";
        document.getElementById('ataques').style.opacity = "100%";

        document.getElementById('trocar_pessoa').disabled = false;
        document.getElementById('trocar_maquina').disabled = false;
        document.getElementById('ataques').disabled = false;
    }

    function cadastrarLuta() {
        fetch(`/jogos/cadastroLuta/${vencedor}/${idusuario}`, { cache: 'no-store' }).then(function (response) {
            if (response.ok) {
                console.log("Puzzle cadastrado")

            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro no cadastro dos dados p/ gráfico: ${error.message}`);
            });
    }
