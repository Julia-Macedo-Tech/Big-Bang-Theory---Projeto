<body onload="validarSessao()">

    <div class="janela">

        <div class="header-left dash-header">

            <img class="logo" src="../assets/imgs/icon.png" alt="">
            <h1>Big Bang Theory</h1>

            <div class="btn-nav-white">
                <a href="cards.html">
                    <p>Quiz</p>
                </a>
            </div>

            <div class="btn-nav">
                <p>Gráficos</p>
            </div>

        <div class="dash">

                <div class="botoes-dados">

                </div>

                <div id="containerMeusDados">

                        </div>
                    </div>

                    <div class="containerPartidas">
                        <div id="graficoVencedor">
                        </div>

                        <div id="tabelaPartidas">
                            <table id="tablePartidas">
                                <tr>

                </div>

                <div id="containerRanking">
                    <p id="sua_colocacao">Sua colocação:</p>

                    <div class="ranking">
                        <table id="table">
                            <tr>
                                <th>Posição</th>
                                <th>User</th>
                                <th>Movimentos</th>
                            </tr>
                        </table>
                    </div>
                </div>
            </div>
        </div>

</html>

<script>
    let idUsuario = sessionStorage.ID_USUARIO;

    let tipoAtual = "Fácil";

    window.onload = exibirAquariosDoUsuario(), validarSessao(), verMeusDados(), exibirPartidasDoUsuario(), preencherKpi();

    function preencherKpi() {
        fetch(`/jogos/selectPuzzle/${idUsuario}`, { cache: 'no-store' }).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                    resposta.reverse();

                    kpi_puzzle.innerHTML = `<div><span class="material-symbols-outlined">Extension</span></div>
                    <p>Recorde de movimentos no puzzle: <p class="destaque">${resposta[0].qtd_movimentos}</p></p> 
                    <p>Data: ${resposta[0].cadastrado_em}</p>`;

                });

            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro no cadastro dos dados p/ gráfico: ${error.message}`);
            });
    }

    function verMeusDados() {
        document.getElementById('containerMeusDados').style.display = "flex"
        document.getElementById('containerRanking').style.display = "none"
        document.getElementById('ranking').classList.remove("btnAtual")
        document.getElementById('meusDados').classList.remove("btnNaoAtual")
        document.getElementById('meusDados').classList.add("btnAtual")
        document.getElementById('ranking').classList.add("btnNaoAtual")
    }

    function verRanking() {
        document.getElementById('containerMeusDados').style.display = "none"
        document.getElementById('containerRanking').style.display = "flex"
        document.getElementById('ranking').classList.remove("btnNaoAtual")
        document.getElementById('meusDados').classList.remove("btnAtual")
        document.getElementById('meusDados').classList.add("btnNaoAtual")
        document.getElementById('ranking').classList.add("btnAtual")

        fetch(`/jogos/ranking`, { cache: 'no-store' }).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                    resposta.reverse();

                    let table = document.getElementById('table');
                    let colocacao = document.getElementById('sua_colocacao');
                    table.innerHTML = `<tr>
                                <td class="tableTitulo"><span class="material-symbols-outlined">Trophy</span>Posição</td>
                                <td class="tableTitulo"><span class="material-symbols-outlined">Person</span>User</td>
                                <td class="tableTitulo"><span class="material-symbols-outlined">Extension</span>Movimentos</td>
                            </tr>`;
                    for (let i = 0; resposta.length > i; i++) {
                        if (i == 0) {
                            table.innerHTML += `<tr>
                                <td class="primeiro">${i + 1}°</td>
                                <td class="primeiro"><span><img src="../assets/imgs/${resposta[i].foto_usuario}.png" alt="">${resposta[i].nome}</span></td>
                                <td class="primeiro">${resposta[i].qtd_movimentos}</td>
                            </tr>`;

                        } else if (i == 1) {
                            table.innerHTML += `<tr>
                                <td class="segundo">${i + 1}°</td>
                                <td class="segundo"><span><img src="../assets/imgs/${resposta[i].foto_usuario}.png" alt="">${resposta[i].nome}</span></td>
                                <td class="segundo">${resposta[i].qtd_movimentos}</td>
                            </tr>`;

                        } else if (i == 2) {
                            table.innerHTML += `<tr>
                                <td class="terceiro">${i + 1}°</td>
                                <td class="terceiro"><span><img src="../assets/imgs/${resposta[i].foto_usuario}.png" alt="">${resposta[i].nome}</span></td>
                                <td class="terceiro">${resposta[i].qtd_movimentos}</td>
                            </tr>`;

                        } else {
                            table.innerHTML += `<tr>
                                <td>${i + 1}°</td>
                                <td><span><img src="../assets/imgs/${resposta[i].foto_usuario}.png" alt="">${resposta[i].nome}</span></td>
                                <td>${resposta[i].qtd_movimentos}</td>
                            </tr>`;
                        }

                        if (idUsuario == resposta[i].id_usuario) {
                            colocacao.innerHTML = `Sua colocação: ${i + 1}° lugar`;
                        }
                    }

                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
            });
    }

    function exibirAquariosDoUsuario(tipo) {
        var quizzes = JSON.parse(sessionStorage.QUIZZES);

        let tipoF = "Fácil";
        let tipoM = "Médio";
        let tipoD = "Difícil";

        document.getElementById("btnAquario").innerHTML = `
            <button class="btn-chart" onclick="exibirAquariosDoUsuario('Fácil')" id="btnAquarioFacil">${tipoF}</button>
            <button class="btn-chart" onclick="exibirAquariosDoUsuario('Médio')" id="btnAquarioMedio">${tipoM}</button>
            <button class="btn-chart" onclick="exibirAquariosDoUsuario('Difícil')" id="btnAquarioDificil">${tipoD}</button>
            `

        if (tipo == "Fácil") {
            tipoAtual = "Fácil";
            // alterando estilo do botão
            let btnAtual = document.getElementById(`btnAquarioMedio`)
            btnAtual.classList.remove("btn-yellow")
            btnAtual.classList.add("btn-white")

            let btnAtual2 = document.getElementById(`btnAquarioDificil`)
            btnAtual2.classList.remove("btn-red")
            btnAtual2.classList.add("btn-white")

            // alterando estilo do botão
            let btnExibir = document.getElementById(`btnAquarioFacil`)
            btnExibir.classList.remove("btn-white")
            btnExibir.classList.add("btn-green")

        } else if (tipo == "Médio") {
            tipoAtual = "Médio";
            // alterando estilo do botão
            let btnAtual = document.getElementById(`btnAquarioFacil`)
            btnAtual.classList.remove("btn-green")
            btnAtual.classList.add("btn-white")

            let btnAtual2 = document.getElementById(`btnAquarioDificil`)
            btnAtual2.classList.remove("btn-red")
            btnAtual2.classList.add("btn-white")

            // alterando estilo do botão
            let btnExibir = document.getElementById(`btnAquarioMedio`)
            btnExibir.classList.remove("btn-white")
            btnExibir.classList.add("btn-yellow")

        } else {
            tipoAtual = "Difícil";
            // alterando estilo do botão
            let btnAtual = document.getElementById(`btnAquarioFacil`)
            btnAtual.classList.remove("btn-green")
            btnAtual.classList.add("btn-white")

            let btnAtual2 = document.getElementById(`btnAquarioMedio`)
            btnAtual2.classList.remove("btn-yellow")
            btnAtual2.classList.add("btn-white")

            // alterando estilo do botão
            let btnExibir = document.getElementById(`btnAquarioDificil`)
            btnExibir.classList.remove("btn-white")
            btnExibir.classList.add("btn-red")
        }

        document.getElementById("graficos").innerHTML = `
                <div id="graficoAtual" >
                        <span id="tituloAquarioAtual"></span>
                    <div class="graph">
                        <canvas id="myChartCanvas"></canvas>
                    </div>
                    <div class="label-captura">
                        <p id="avisoCapturaAtual" style="color: white"></p>
                    </div>
                </div>
            `


        obterDadosGrafico(tipoAtual)

    }

    function alterarTitulo(idAquario) {
        var tituloAquario = document.getElementById(`tituloAquarioAtual`)
        var descricao = tipoAtual;

        if (tipoAtual == "Fácil") {
            tituloAquario.innerHTML = "<span>Histórico de pontuação no quiz <span style='color: #4cc659'>" + descricao + "</span>";

        } else if (tipoAtual == "Médio") {
            tituloAquario.innerHTML = "<span>Histórico de pontuação no quiz <span style='color: #ffd600'>" + descricao + "</span>";

        } else if (tipoAtual == "Difícil") {
            tituloAquario.innerHTML = "<span>Histórico de pontuação no quiz <span style='color: #d5312c'>" + descricao + "</span>";

        }
    }

    // O gráfico é construído com três funções:
    // 1. obterDadosGrafico -> Traz dados do Banco de Dados para montar o gráfico da primeira vez
    // 2. plotarGrafico -> Monta o gráfico com os dados trazidos e exibe em tela
    // 3. atualizarGrafico -> Atualiza o gráfico, trazendo novamente dados do Banco

    // Esta função *obterDadosGrafico* busca os últimos dados inseridos em tabela de medidas.
    // para, quando carregar o gráfico da primeira vez, já trazer com vários dados.
    // A função *obterDadosGrafico* também invoca a função *plotarGrafico*

    //     Se quiser alterar a busca, ajuste as regras de negócio em src/controllers
    //     Para ajustar o "select", ajuste o comando sql em src/models
    function obterDadosGrafico(tipo) {

        alterarTitulo(tipo)

        fetch(`/medidas/ultimas/${idUsuario}/${tipo}`, { cache: 'no-store' }).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                    resposta.reverse();

                    let qtd_maior = 0;
                    let data = null;

                    for (let i = 0; i < resposta.length; i++) {
                        let atual = resposta[i].pontuacao_matematica + resposta[i].pontuacao_serie;

                        if (atual >= qtd_maior) {
                            qtd_maior = atual;
                            data = resposta[i].cadastrado_em;
                        }
                    }

                    kpi_quiz.innerHTML = `<div><span class="material-symbols-outlined">Quiz</span></div>
                    <p>Recorde de acertos no quiz <span id="tipoQ">${tipo}</span>: <p class="destaque">${qtd_maior}</p></p> 
                    <p>Data: ${data}</p>`;

                    let tipoQ = document.getElementById(`tipoQ`)
                    if (tipo == "Fácil") {
                        tipoQ.classList.add("facil")
                        tipoQ.classList.remove("medio")
                        tipoQ.classList.remove("dificil")

                    } else if (tipo == "Médio") {
                        tipoQ.classList.remove("facil")
                        tipoQ.classList.add("medio")
                        tipoQ.classList.remove("dificil")

                    } else if (tipo == "Difícil") {
                        tipoQ.classList.remove("facil")
                        tipoQ.classList.remove("medio")
                        tipoQ.classList.add("dificil")
                    }

                    plotarGrafico(resposta, tipo);

                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
            });
    }

    // Esta função *plotarGrafico* usa os dados capturados na função anterior para criar o gráfico
    // Configura o gráfico (cores, tipo, etc), materializa-o na página e, 
    // A função *plotarGrafico* também invoca a função *atualizarGrafico*
    function plotarGrafico(resposta, tipo) {

        console.log('iniciando plotagem do gráfico...');

        // Criando estrutura para plotar gráfico - labels
        let labels = [];

        // Criando estrutura para plotar gráfico - dados
        let dados = {
            labels: labels,
            datasets: [
                {
                    label: 'Matemática',
                    data: [],
                    fill: false,
                    backgroundColor: '#ff751f',
                    tension: 0.1
                },
                {
                    label: 'Série',
                    data: [],
                    fill: false,
                    backgroundColor: '#51bca5',
                    tension: 0.1
                }]
        };

        console.log('----------------------------------------------')
        console.log('Estes dados foram recebidos pela funcao "obterDadosGrafico" e passados para "plotarGrafico":')
        console.log(resposta)

        // Inserindo valores recebidos em estrutura para plotar o gráfico
        for (i = 0; i < resposta.length; i++) {
            var registro = resposta[i];
            labels.push(registro.cadastrado_em);
            dados.datasets[0].data.push(registro.pontuacao_matematica);
            dados.datasets[1].data.push(registro.pontuacao_serie);
        }

        console.log('----------------------------------------------')
        console.log('O gráfico será plotado com os respectivos valores:')
        console.log('Labels:')
        console.log(labels)
        console.log('Dados:')
        console.log(dados.datasets)
        console.log('----------------------------------------------')

        // Criando estrutura para plotar gráfico - config
        const config = {
            type: 'bar',
            data: dados,
            options: {
                plugins: {
                    legend: {
                        labels: {
                            color: '#ffffff'
                        }
                    }
                },
                scales: {
                    x: {
                        ticks: {
                            color: '#ffffff'
                        }
                    },
                    y: {
                        ticks: {
                            color: '#ffffff'
                        }
                    }
                }
            }
        };

        // Adicionando gráfico criado em div na tela
        let myChart = new Chart(
            document.getElementById(`myChartCanvas`),
            config
        );

    }


    // Esta função *atualizarGrafico* atualiza o gráfico que foi renderizado na página,
    // buscando a última medida inserida em tabela contendo as capturas, 

    //     Se quiser alterar a busca, ajuste as regras de negócio em src/controllers
    //     Para ajustar o "select", ajuste o comando sql em src/models


    ////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////////


    function exibirPartidasDoUsuario() {
        document.getElementById("graficoVencedor").innerHTML = `
                <div id="graficoAtual" >
                        <span id="tituloAquarioAtual">Proporção de vitórias e derrotas no jogo de luta</span>
                    <div class="graph">
                        <canvas id="myChartCanvasPartidas"></canvas>
                    </div>
                    <div class="label-captura">
                        <p id="avisoCapturaAtual" style="color: white"></p>
                    </div>
                </div>
            `;

        fetch(`/jogos/tabela/${idUsuario}`, { cache: 'no-store' }).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                    resposta.reverse();

                    let soma = 0;
                    let soma_ganho = 0;
                    let porc = 0;
                    let table = document.getElementById('tablePartidas');
                    table.innerHTML = `<tr>
                                    <td class="tableTitulo"><span class="material-symbols-outlined">Trophy</span>Partida</td>
                                    <td class="tableTitulo"><span class="material-symbols-outlined">Crown</span>Vencedor</td>
                                    <td class="tableTitulo"><span class="material-symbols-outlined">Today</span>Data</td>
                                </tr>`;
                    for (let i = 0; resposta.length > i; i++) {
                        table.innerHTML += `<tr>
                                <td>${i + 1}</td>
                                <td><span>${resposta[i].vencedor}</span></td>
                                <td>${resposta[i].cadastrado_em}</td>
                            </tr>`;

                        soma++
                        if (resposta[i].vencedor == "Você") {
                            soma_ganho++
                        }
                    }

                    porc = soma_ganho / soma * 100;
                    kpi_luta.innerHTML = `<div><span class="material-symbols-outlined">Swords</span></div>
                    <p>Taxa de vitórias no jogo de luta: <p class="destaque">${porc.toFixed(2)}%</p></p>`;

                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
            });


        obterDadosGraficoPartidas()

    }

    // O gráfico é construído com três funções:
    // 1. obterDadosGrafico -> Traz dados do Banco de Dados para montar o gráfico da primeira vez
    // 2. plotarGrafico -> Monta o gráfico com os dados trazidos e exibe em tela
    // 3. atualizarGrafico -> Atualiza o gráfico, trazendo novamente dados do Banco

    // Esta função *obterDadosGrafico* busca os últimos dados inseridos em tabela de medidas.
    // para, quando carregar o gráfico da primeira vez, já trazer com vários dados.
    // A função *obterDadosGrafico* também invoca a função *plotarGrafico*

    //     Se quiser alterar a busca, ajuste as regras de negócio em src/controllers
    //     Para ajustar o "select", ajuste o comando sql em src/models
    function obterDadosGraficoPartidas() {
        fetch(`/jogos/vencedor/${idUsuario}`, { cache: 'no-store' }).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                    resposta.reverse();

                    plotarGraficoPartidas(resposta);

                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
            });
    }

    // Esta função *plotarGrafico* usa os dados capturados na função anterior para criar o gráfico
    // Configura o gráfico (cores, tipo, etc), materializa-o na página e, 
    // A função *plotarGrafico* também invoca a função *atualizarGrafico*
    function plotarGraficoPartidas(resposta) {

        console.log('iniciando plotagem do gráfico...');

        // Criando estrutura para plotar gráfico - labels
        let labels = ["Vitórias", "Derrotas"];

        // Criando estrutura para plotar gráfico - dados
        let dados = {
            labels: labels,
            datasets: [
                {
                    label: [],
                    data: [],
                    fill: false,
                    backgroundColor: ['#4cc659', '#c73434'],
                    tension: 0.1
                }]
        };

        console.log('----------------------------------------------')
        console.log('Estes dados foram recebidos pela funcao "obterDadosGrafico" e passados para "plotarGrafico":')
        console.log(resposta)

        // Inserindo valores recebidos em estrutura para plotar o gráfico
        for (i = 0; i < resposta.length; i++) {
            var registro = resposta[i];
            dados.datasets[0].data.push(registro.voce_ganhou);
            dados.datasets[0].data.push(registro.maquina_ganhou);
        }

        console.log('----------------------------------------------')
        console.log('O gráfico será plotado com os respectivos valores:')
        console.log('Labels:')
        console.log(labels)
        console.log('Dados:')
        console.log(dados.datasets)
        console.log('----------------------------------------------')

        // Criando estrutura para plotar gráfico - config
        const config = {
            type: 'pie',
            data: dados,
            options: {
                plugins: {
                    legend: {
                        labels: {
                            color: '#ffffff'
                        }
                    }
                }
            }
        };

        // Adicionando gráfico criado em div na tela
        let myChart = new Chart(
            document.getElementById(`myChartCanvasPartidas`),
            config
        );
    }

</script>
