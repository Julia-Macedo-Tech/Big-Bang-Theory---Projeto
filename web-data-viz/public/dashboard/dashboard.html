<script>
    b_usuario.innerHTML = sessionStorage.NOME_USUARIO;

    let tipoAtual = "Fácil";
    let proximaAtualizacao;

    window.onload = exibirAquariosDoUsuario(), validarSessao(), verMeusDados();

    function verMeusDados() {
        document.getElementById('containerMeusDados').style.display = "flex"
        document.getElementById('containerRanking').style.display = "none"
        document.getElementById('ranking').classList.remove("btnAtual")
        document.getElementById('meusDados').classList.remove("btnNaoAtual")
        document.getElementById('meusDados').classList.add("btnAtual")
        document.getElementById('ranking').classList.add("btnNaoAtual")
    }

    function verRanking() {
        document.getElementById('containerMeusDados').style.display = "none"
        document.getElementById('containerRanking').style.display = "flex"
        document.getElementById('ranking').classList.remove("btnNaoAtual")
        document.getElementById('meusDados').classList.remove("btnAtual")
        document.getElementById('meusDados').classList.add("btnNaoAtual")
        document.getElementById('ranking').classList.add("btnAtual")

        fetch(`/jogos/ranking`, { cache: 'no-store' }).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                    resposta.reverse();

                    let table = document.getElementById('table');
                    table.innerHTML = ``;
                    for (let i = 0; resposta.length > i; i++) {
                        table.innerHTML += `<tr>
                                <td>${i+1}</td>
                                <td><span><img src="../assets/imgs/${resposta[i].foto_usuario}.png" alt="">${resposta[i].nome}</span></td>
                                <td>${resposta[i].qtd_movimentos}</td>
                            </tr>`;
                    }

                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
            });
    }

    function exibirAquariosDoUsuario(tipo) {
        var quizzes = JSON.parse(sessionStorage.QUIZZES);

        let tipoF = "Fácil";
        let tipoM = "Médio";
        let tipoD = "Difícil";

        document.getElementById("btnAquario").innerHTML = `
            <button class="btn-chart" onclick="exibirAquariosDoUsuario('Fácil')" id="btnAquarioFacil">${tipoF}</button>
            <button class="btn-chart" onclick="exibirAquariosDoUsuario('Médio')" id="btnAquarioMedio">${tipoM}</button>
            <button class="btn-chart" onclick="exibirAquariosDoUsuario('Difícil')" id="btnAquarioDificil">${tipoD}</button>
            `

        if (tipo == "Fácil") {
            tipoAtual = "Fácil";
            // alterando estilo do botão
            let btnAtual = document.getElementById(`btnAquarioMedio`)
            if (btnAtual.classList.contains("btn-pink")) {
                btnAtual.classList.remove("btn-pink")
            }
            btnAtual.classList.add("btn-white")

            let btnAtual2 = document.getElementById(`btnAquarioDificil`)
            if (btnAtual2.classList.contains("btn-pink")) {
                btnAtual2.classList.remove("btn-pink")
            }
            btnAtual.classList.add("btn-white")

            // alterando estilo do botão
            let btnExibir = document.getElementById(`btnAquarioFacil`)
            btnExibir.classList.remove("btn-white")
            btnExibir.classList.add("btn-pink")

        } else if (tipo == "Médio") {
            tipoAtual = "Médio";
            // alterando estilo do botão
            let btnAtual = document.getElementById(`btnAquarioFacil`)
            if (btnAtual.classList.contains("btn-pink")) {
                btnAtual.classList.remove("btn-pink")
            }
            btnAtual.classList.add("btn-white")

            let btnAtual2 = document.getElementById(`btnAquarioDificil`)
            if (btnAtual2.classList.contains("btn-pink")) {
                btnAtual2.classList.remove("btn-pink")
            }
            btnAtual.classList.add("btn-white")

            // alterando estilo do botão
            let btnExibir = document.getElementById(`btnAquarioMedio`)
            btnExibir.classList.remove("btn-white")
            btnExibir.classList.add("btn-pink")

        } else {
            tipoAtual = "Difícil";
            // alterando estilo do botão
            let btnAtual = document.getElementById(`btnAquarioFacil`)
            if (btnAtual.classList.contains("btn-pink")) {
                btnAtual.classList.remove("btn-pink")
            }
            btnAtual.classList.add("btn-white")

            let btnAtual2 = document.getElementById(`btnAquarioMedio`)
            if (btnAtual2.classList.contains("btn-pink")) {
                btnAtual2.classList.remove("btn-pink")
            }
            btnAtual.classList.add("btn-white")

            // alterando estilo do botão
            let btnExibir = document.getElementById(`btnAquarioDificil`)
            btnExibir.classList.remove("btn-white")
            btnExibir.classList.add("btn-pink")
        }

        document.getElementById("graficos").innerHTML = `
                <div id="graficoAtual" >
                    <h3 class="tituloGraficos">
                        <span id="tituloAquarioAtual"></span>
                    </h3>
                    <div class="graph">
                        <canvas id="myChartCanvas"></canvas>
                    </div>
                    <div class="label-captura">
                        <p id="avisoCapturaAtual" style="color: white"></p>
                    </div>
                </div>
            `


        obterDadosGrafico(tipoAtual)


        if (quizzes.length > 0) {
            exibirAquario(quizzes[0].id_quiz)
        }
    }

    function alterarTitulo(idAquario) {
        var tituloAquario = document.getElementById(`tituloAquarioAtual`)
        var descricao = tipoAtual;
        tituloAquario.innerHTML = "Últimas medidas do <span style='color: #e6005a'>" + descricao + "</span>"
    }

    function exibirAquario(tipo) {

    }

    // O gráfico é construído com três funções:
    // 1. obterDadosGrafico -> Traz dados do Banco de Dados para montar o gráfico da primeira vez
    // 2. plotarGrafico -> Monta o gráfico com os dados trazidos e exibe em tela
    // 3. atualizarGrafico -> Atualiza o gráfico, trazendo novamente dados do Banco

    // Esta função *obterDadosGrafico* busca os últimos dados inseridos em tabela de medidas.
    // para, quando carregar o gráfico da primeira vez, já trazer com vários dados.
    // A função *obterDadosGrafico* também invoca a função *plotarGrafico*

    //     Se quiser alterar a busca, ajuste as regras de negócio em src/controllers
    //     Para ajustar o "select", ajuste o comando sql em src/models
    function obterDadosGrafico(tipo) {

        alterarTitulo(tipo)

        if (proximaAtualizacao != undefined) {
            clearTimeout(proximaAtualizacao);
        }

        idUsuario = sessionStorage.ID_USUARIO;

        fetch(`/medidas/ultimas/${idUsuario}/${tipo}`, { cache: 'no-store' }).then(function (response) {
            if (response.ok) {
                response.json().then(function (resposta) {
                    console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                    resposta.reverse();

                    plotarGrafico(resposta, tipo);

                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
            });
    }

    // Esta função *plotarGrafico* usa os dados capturados na função anterior para criar o gráfico
    // Configura o gráfico (cores, tipo, etc), materializa-o na página e, 
    // A função *plotarGrafico* também invoca a função *atualizarGrafico*
    function plotarGrafico(resposta, tipo) {

        console.log('iniciando plotagem do gráfico...');

        // Criando estrutura para plotar gráfico - labels
        let labels = [];

        // Criando estrutura para plotar gráfico - dados
        let dados = {
            labels: labels,
            datasets: [
                {
                    label: 'Matemática',
                    data: [],
                    fill: false,
                    backgroundColor: '#ffffff',
                    tension: 0.1
                },
                {
                    label: 'Série',
                    data: [],
                    fill: false,
                    backgroundColor: 'rgb(199, 52, 52)',
                    tension: 0.1
                }]
        };

        console.log('----------------------------------------------')
        console.log('Estes dados foram recebidos pela funcao "obterDadosGrafico" e passados para "plotarGrafico":')
        console.log(resposta)

        // Inserindo valores recebidos em estrutura para plotar o gráfico
        for (i = 0; i < resposta.length; i++) {
            var registro = resposta[i];
            labels.push(registro.cadastrado_em);
            dados.datasets[0].data.push(registro.pontuacao_matematica);
            dados.datasets[1].data.push(registro.pontuacao_serie);
        }

        console.log('----------------------------------------------')
        console.log('O gráfico será plotado com os respectivos valores:')
        console.log('Labels:')
        console.log(labels)
        console.log('Dados:')
        console.log(dados.datasets)
        console.log('----------------------------------------------')

        // Criando estrutura para plotar gráfico - config
        const config = {
            type: 'bar',
            data: dados,
            options: {
                plugins: {
                    legend: {
                        labels: {
                            color: '#ffffff'
                        }
                    }
                },
                scales: {
                    x: {
                        ticks: {
                            color: '#ffffff'
                        }
                    },
                    y: {
                        ticks: {
                            color: '#ffffff'
                        }
                    }
                }
            }
        };

        // Adicionando gráfico criado em div na tela
        let myChart = new Chart(
            document.getElementById(`myChartCanvas`),
            config
        );

        setTimeout(() => atualizarGrafico(dados, myChart, tipo), 2000);
    }


    // Esta função *atualizarGrafico* atualiza o gráfico que foi renderizado na página,
    // buscando a última medida inserida em tabela contendo as capturas, 

    //     Se quiser alterar a busca, ajuste as regras de negócio em src/controllers
    //     Para ajustar o "select", ajuste o comando sql em src/models

    idUsuario = sessionStorage.ID_USUARIO;

    function atualizarGrafico(dados, myChart, tipo) {

        fetch(`/medidas/tempo-real/${idUsuario}/${tipo}`, { cache: 'no-store' }).then(function (response) {
            if (response.ok) {
                response.json().then(function (novoRegistro) {

                    // obterdados(idAquario);
                    // alertar(novoRegistro, idAquario);
                    console.log(`Dados recebidos: ${JSON.stringify(novoRegistro)}`);
                    console.log(`Dados atuais do gráfico:`);
                    console.log(dados);

                    let avisoCaptura = document.getElementById(`avisoCapturaAtual`)
                    avisoCaptura.innerHTML = ""


                    if (novoRegistro[0].cadastrado_em == dados.labels[dados.labels.length - 1]) {
                        console.log("---------------------------------------------------------------")
                        console.log("Como não há dados novos para captura, o gráfico não atualizará.")
                        avisoCaptura.innerHTML = "<i class='fa-solid fa-triangle-exclamation'></i> Foi trazido o dado mais atual capturado pelo sensor. <br> Como não há dados novos a exibir, o gráfico não atualizará."
                        console.log("Horário do novo dado capturado:")
                        console.log(novoRegistro[0].cadastrado_em)
                        console.log("Horário do último dado capturado:")
                        console.log(dados.labels[dados.labels.length - 1])
                        console.log("---------------------------------------------------------------")
                    } else {
                        // tirando e colocando valores no gráfico
                        dados.labels.shift(); // apagar o primeiro
                        dados.labels.push(novoRegistro[0].cadastrado_em); // incluir um novo momento

                        dados.datasets[0].data.shift();  // apagar o primeiro de temperatura
                        dados.datasets[0].data.push(novoRegistro[0].pontuacao_matematica); // incluir uma nova medida de temperatura

                        dados.datasets[1].data.shift();  // apagar o primeiro de temperatura
                        dados.datasets[1].data.push(novoRegistro[0].pontuacao_serie); // incluir uma nova medida de temperatura

                        myChart.update();
                    }

                    // Altere aqui o valor em ms se quiser que o gráfico atualize mais rápido ou mais devagar
                    proximaAtualizacao = setTimeout(() => atualizarGrafico(dados, myChart, tipo), 2000);
                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
                // Altere aqui o valor em ms se quiser que o gráfico atualize mais rápido ou mais devagar
                proximaAtualizacao = setTimeout(() => atualizarGrafico(dados, myChart, tipo), 2000);
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
            });

    }
</script>
